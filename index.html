<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Weapon Blind Test</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar px-3">
  <span class="fw-bold">🔫 Weapon Blind Test</span>

  <div class="ms-auto d-flex gap-2">
    <button id="themeToggle" class="btn btn-outline-light btn-sm">
      <i class="bi bi-moon"></i>
    </button>
  </div>
</nav>

<div class="controls-fixed">
  <button id="btn-refresh" class="btn btn-primary btn-sm">🔄</button>
  <button id="btn-filters" class="btn btn-secondary btn-sm">⚙️</button>
</div>

<div class="container main-container">

  <!-- FILTERS -->
  <div id="filters" class="card p-3 shadow">

    <!-- ✅ START + RESET EN HAUT -->
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-primary w-100" onclick="startGame()">Start</button>
      <button class="btn btn-outline-secondary w-100" onclick="resetFilters()">Reset</button>
    </div>

    <h5 class="mb-2">Filters</h5>

    <div id="filters-container"></div>

    <!-- YEAR -->
    <div class="mt-3">
      <label>Years of Use</label>
      <div class="d-flex gap-2">
        <input id="year-start" type="number" class="form-control" placeholder="Start">
        <input id="year-end" type="number" class="form-control" placeholder="End">
      </div>
    </div>

  </div>

  <!-- GAME -->
  <div id="game" class="card p-3 shadow text-center" style="display:none;">

    <h4 id="title"></h4>

    <img id="weapon-img" class="weapon-img my-3" />

    <div id="info" class="text-start"></div>

    <small class="mt-2">Tap image → reveal / next</small>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
